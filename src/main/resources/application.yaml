spring:
  application:
    name: gongshi-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/my-gongshi?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

server:
  port: 3102

# JWT 配置
jwt:
  secret: kele-gongshi-secret-key-change-this-in-production-2024
  expiration: 86400000  # Token过期时间（毫秒），默认24小时
